<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Metadatos – cambia esto ── -->
  <title>Cosas Mias</title>
  <meta name="description" content="Proyectos personales de desarrollo" />
  <meta name="author" content="Tu Nombre" />

  <!-- Open Graph (previsualización en redes sociales) -->
  <meta property="og:title"       content="Mi Portafolio" />
  <meta property="og:description" content="Proyectos personales de desarrollo" />
  <meta property="og:type"        content="website" />
  <!-- <meta property="og:image" content="assets/img/og-cover.png" /> -->

  <!-- ── Estilos ── -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/decorations.css" />
</head>
<body>

  <!-- ════════════════════════════════
       FONDO DECORATIVO — ramas y hojas
       Para editar colores/formas: modifica el SVG aquí abajo
       o ajusta css/decorations.css
       ════════════════════════════════ -->
  <div class="leaf-bg" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice"
         xmlns="http://www.w3.org/2000/svg">

      <!-- Rama principal superior izquierda -->
      <path d="M-30,50 Q200,120 350,80 Q500,40 620,180"
            stroke="#7a9e7e" stroke-width="2.5" fill="none" opacity="0.28"/>
      <!-- Sub-ramas -->
      <path d="M350,80 Q320,20 280,10"
            stroke="#7a9e7e" stroke-width="1.5" fill="none" opacity="0.22"/>
      <path d="M450,60 Q430,-10 400,-20"
            stroke="#7a9e7e" stroke-width="1.5" fill="none" opacity="0.22"/>
      <path d="M530,95 Q510,40 480,25"
            stroke="#7a9e7e" stroke-width="1.2" fill="none" opacity="0.18"/>

      <!-- Hojas cluster superior izquierdo -->
      <ellipse class="leaf--float" cx="268" cy="22"  rx="30" ry="13"
               fill="#a8c5a0" opacity="0.2" transform="rotate(-25,268,22)"/>
      <ellipse class="leaf--float-slow" cx="316" cy="-4" rx="25" ry="10"
               fill="#7a9e7e" opacity="0.16" transform="rotate(-15,316,-4)"/>
      <ellipse class="leaf--float" cx="418" cy="-14" rx="27" ry="11"
               fill="#4d7358" opacity="0.13" transform="rotate(-38,418,-14)"/>
      <ellipse cx="488" cy="18"  rx="22" ry="9"
               fill="#8fad82" opacity="0.14" transform="rotate(-50,488,18)"/>
      <ellipse class="leaf--float-slow" cx="598" cy="158" rx="33" ry="13"
               fill="#a8c5a0" opacity="0.17" transform="rotate(20,598,158)"/>

      <!-- Rama superior derecha -->
      <path d="M1100,0 Q1250,75 1475,48"
            stroke="#5c3d2e" stroke-width="2" fill="none" opacity="0.1"/>
      <path d="M1200,28 Q1188,-22 1158,-34"
            stroke="#5c3d2e" stroke-width="1.5" fill="none" opacity="0.1"/>
      <path d="M1310,18 Q1300,-18 1278,-28"
            stroke="#5c3d2e" stroke-width="1.2" fill="none" opacity="0.08"/>
      <ellipse class="leaf--float" cx="1163" cy="-28" rx="27" ry="10"
               fill="#c9a87c" opacity="0.1" transform="rotate(-30,1163,-28)"/>
      <ellipse cx="1278" cy="12"  rx="30" ry="12"
               fill="#7a9e7e" opacity="0.1" transform="rotate(10,1278,12)"/>

      <!-- Rama inferior izquierda -->
      <path d="M-45,818 Q180,778 305,858 Q425,940 510,818"
            stroke="#4d7358" stroke-width="2" fill="none" opacity="0.18"/>
      <path d="M200,790 Q185,740 165,728"
            stroke="#4d7358" stroke-width="1.2" fill="none" opacity="0.15"/>
      <ellipse class="leaf--float-slow" cx="208" cy="790" rx="29" ry="12"
               fill="#8fad82" opacity="0.17" transform="rotate(-10,208,790)"/>
      <ellipse cx="378" cy="872" rx="27" ry="11"
               fill="#7a9e7e" opacity="0.14" transform="rotate(15,378,872)"/>
      <ellipse class="leaf--float" cx="158" cy="722" rx="22" ry="9"
               fill="#a8c5a0" opacity="0.13" transform="rotate(-30,158,722)"/>

      <!-- Rama inferior derecha -->
      <path d="M1295,905 Q1378,825 1462,782"
            stroke="#7a5240" stroke-width="1.8" fill="none" opacity="0.1"/>
      <ellipse cx="1382" cy="832" rx="31" ry="12"
               fill="#c9a87c" opacity="0.1" transform="rotate(-22,1382,832)"/>

      <!-- Hojas sueltas dispersas -->
      <ellipse class="leaf--float-slow" cx="748" cy="55"  rx="17" ry="7"
               fill="#a8c5a0" opacity="0.1" transform="rotate(40,748,55)"/>
      <ellipse cx="902" cy="818" rx="21" ry="8"
               fill="#4d7358" opacity="0.11" transform="rotate(-15,902,818)"/>
      <ellipse class="leaf--float" cx="102" cy="452" rx="19" ry="8"
               fill="#8fad82" opacity="0.1" transform="rotate(60,102,452)"/>
      <ellipse cx="1402" cy="448" rx="23" ry="9"
               fill="#7a9e7e" opacity="0.09" transform="rotate(-40,1402,448)"/>
      <ellipse class="leaf--float-slow" cx="720" cy="895" rx="20" ry="8"
               fill="#a8c5a0" opacity="0.1" transform="rotate(25,720,895)"/>
    </svg>
  </div>


  <!-- ════════════════════════════════
       HEADER
       Cambia el título y subtítulo aquí
       ════════════════════════════════ -->
  <header class="site-header">
    <div class="header__ornament">
      <span class="header__ornament-line"></span>
      <span class="header__ornament-icon">🌿</span>
      <span class="header__ornament-line"></span>
    </div>
    <h1 class="site-header__title">Cosas Mias</h1>
    <p class="site-header__subtitle">Cosas que hago</p>
  </header>


  <!-- ════════════════════════════════
       CONTENIDO PRINCIPAL
       ════════════════════════════════ -->
  <main class="site-main">

    <h2 class="section-title">🍃 Proyectos</h2>

    <!-- Las tarjetas se generan automáticamente desde js/projects.js -->
    <div id="projects-grid" role="list" aria-label="Lista de proyectos"></div>

  </main>


  <!-- ════════════════════════════════
       FOOTER – cambia el nombre/link
       ════════════════════════════════ -->
  <footer class="site-footer">
    <p>
      Hecho con 🌱 por
      <a href="https://github.com/tuusuario" target="_blank" rel="noopener">SOrtega</a>
    </p>
  </footer>


  <!-- ── Scripts (orden importante: primero los datos, luego la lógica) ── -->
  <script src="js/projects.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
